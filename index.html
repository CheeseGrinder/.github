  <title>Redirecting ...</title>
  <style>
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background: #0d0e11;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'JetBrains Mono', 'Courier New', monospace;
      overflow: hidden;
      position: relative;
    }

    .grid-bg {
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(255, 255, 255, 0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255, 255, 255, 0.03) 1px, transparent 1px);
      background-size: 40px 40px;
      pointer-events: none;
    }

    .scanline {
      position: fixed;
      inset: 0;
      background: repeating-linear-gradient(0deg,
          transparent,
          transparent 2px,
          rgba(0, 0, 0, 0.08) 2px,
          rgba(0, 0, 0, 0.08) 4px);
      pointer-events: none;
      z-index: 1;
    }

    .glow-orb {
      position: fixed;
      width: 500px;
      height: 500px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(61, 220, 151, 0.06) 0%, transparent 70%);
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      pointer-events: none;
      animation: pulse-orb 4s ease-in-out infinite;
    }

    @keyframes pulse-orb {

      0%,
      100% {
        opacity: 0.5;
        transform: translate(-50%, -50%) scale(1);
      }

      50% {
        opacity: 1;
        transform: translate(-50%, -50%) scale(1.1);
      }
    }

    .card {
      position: relative;
      z-index: 2;
      background: #13151a;
      border: 1px solid #2a2d36;
      border-radius: 16px;
      padding: 48px 56px;
      text-align: center;
      min-width: 420px;
      animation: fade-in 0.6s ease forwards;
    }

    @keyframes fade-in {
      from {
        opacity: 0;
        transform: translateY(16px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .card::before {
      content: '';
      position: absolute;
      inset: -1px;
      border-radius: 16px;
      padding: 1px;
      background: linear-gradient(135deg, rgba(61, 220, 151, 0.3) 0%, transparent 50%, rgba(61, 220, 151, 0.1) 100%);
      -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
      -webkit-mask-composite: xor;
      mask-composite: exclude;
      pointer-events: none;
    }

    .header-label {
      font-size: 10px;
      letter-spacing: 0.25em;
      color: #3ddc97;
      text-transform: uppercase;
      margin-bottom: 32px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }

    .header-label::before,
    .header-label::after {
      content: '';
      flex: 1;
      max-width: 48px;
      height: 1px;
      background: linear-gradient(90deg, transparent, #3ddc97);
    }

    .header-label::after {
      background: linear-gradient(270deg, transparent, #3ddc97);
    }

    .logos {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 24px;
      margin-bottom: 32px;
    }

    .logo-wrap {
      width: 72px;
      height: 72px;
      border-radius: 14px;
      background: #1a1d24;
      border: 1px solid #2a2d36;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      transition: border-color 0.3s, transform 0.3s;
    }

    .logo-wrap:hover {
      border-color: #3ddc97;
      transform: translateY(-2px);
    }

    .logo-wrap img {
      width: 42px;
      height: 42px;
    }

    .arrow-wrap {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
    }

    .arrow-line {
      width: 48px;
      height: 1px;
      background: linear-gradient(90deg, #2a2d36, #3ddc97, #2a2d36);
      position: relative;
      overflow: hidden;
    }

    .arrow-line::after {
      content: '';
      position: absolute;
      top: -2px;
      left: -100%;
      width: 40%;
      height: 5px;
      background: linear-gradient(90deg, transparent, #3ddc97);
      animation: flow 2s linear infinite;
      border-radius: 2px;
    }

    @keyframes flow {
      0% {
        left: -40%;
      }

      100% {
        left: 140%;
      }
    }

    .arrow-head {
      font-size: 18px;
      color: #3ddc97;
      animation: bounce-x 2s ease-in-out infinite;
    }

    @keyframes bounce-x {

      0%,
      100% {
        transform: translateX(0);
      }

      50% {
        transform: translateX(4px);
      }
    }

    .title {
      font-size: 22px;
      font-weight: 500;
      color: #e8eaf0;
      margin-bottom: 8px;
      letter-spacing: -0.02em;
    }

    .subtitle {
      font-size: 12px;
      color: #4a4e5e;
      letter-spacing: 0.05em;
      margin-bottom: 32px;
    }

    .progress-wrap {
      background: #1a1d24;
      border-radius: 4px;
      height: 3px;
      overflow: hidden;
      margin-bottom: 12px;
    }

    .progress-bar {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, #2a9d6e, #3ddc97);
      border-radius: 4px;
      animation: fill-bar 3s linear forwards;
    }

    @keyframes fill-bar {
      from {
        width: 0%;
      }

      to {
        width: 100%;
      }
    }

    .counter {
      font-size: 11px;
      color: #3ddc97;
      letter-spacing: 0.1em;
    }

    .link {
      display: block;
      margin-top: 20px;
      font-size: 11px;
      color: #2a4d3a;
      letter-spacing: 0.05em;
      text-decoration: none;
      transition: color 0.2s;
    }

    .link:hover {
      color: #3ddc97;
    }

    .corner {
      position: absolute;
      width: 10px;
      height: 10px;
      border-color: #3ddc97;
      border-style: solid;
      opacity: 0.4;
    }

    .corner-tl {
      top: 10px;
      left: 10px;
      border-width: 1px 0 0 1px;
    }

    .corner-tr {
      top: 10px;
      right: 10px;
      border-width: 1px 1px 0 0;
    }

    .corner-bl {
      bottom: 10px;
      left: 10px;
      border-width: 0 0 1px 1px;
    }

    .corner-br {
      bottom: 10px;
      right: 10px;
      border-width: 0 1px 1px 0;
    }
  </style>
